name: Deploy

# CD real (build da imagem + update dos Cloud Run Jobs). Fica DESLIGADO até o projeto GCP
# existir: ligar criando a repository variable GCP_READY=true e os secrets abaixo.
#
# Secrets/vars necessários:
#   vars.GCP_READY            = "true" para habilitar
#   secrets.GCP_PROJECT_ID    = ID do projeto
#   secrets.GCP_WIF_PROVIDER  = projects/N/locations/global/workloadIdentityPools/…/providers/…
#   secrets.GCP_SA_EMAIL      = service account de deploy

on:
  push:
    branches: [main]
    paths: ["jobs/**", "Dockerfile", "requirements.txt"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC p/ Workload Identity Federation (sem chave JSON)

env:
  REGION: southamerica-east1

jobs:
  build-and-deploy:
    if: vars.GCP_READY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build e push da imagem
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/panorama-br/extractor:latest"
          gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Atualiza Cloud Run Jobs
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/panorama-br/extractor:latest"
          for job in brz-bacen-sgs brz-ibge-sidra; do
            gcloud run jobs update "$job" --image "$IMAGE" --region "$REGION" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          done
